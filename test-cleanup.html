<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRIMZY - STANDALONE RESET TOOL</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- Use Firebase Compat Libraries (Standalone / No Module) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: #0B0B18;
      color: white;
      font-family: 'Sora', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 24px;
      max-width: 500px;
      width: 90%;
    }

    h1 {
      color: #ff4d4d;
      margin-top: 0;
    }

    p {
      color: #A0AEC0;
      line-height: 1.6;
    }

    .btn {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #ff3333;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 77, 77, 0.3);
    }

    .btn:disabled {
      background: #444;
      cursor: not-allowed;
    }

    #status {
      margin-top: 30px;
      text-align: left;
      font-family: monospace;
      font-size: 14px;
      max-height: 200px;
      overflow-y: auto;
      background: #000;
      padding: 15px;
      border-radius: 8px;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .success {
      color: #48BB78;
    }

    .info {
      color: #A0AEC0;
    }

    .error {
      color: #F56565;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>☢️ STANDALONE RESET</h1>
    <p>This version is updated to work locally without a server.</p>
    <p>Deletes: <strong>barbers, bookings, reviews, users</strong></p>

    <button id="reset-btn" class="btn" onclick="performReset()">WIPE ALL DATABASE DATA</button>

    <div id="status">
      <div class="log-entry">Searching for collections...</div>
    </div>
  </div>

  <script>
    // STANDALONE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyDciX44koaTNnC26NNUaEXVy_nL-e0c4xo",
      authDomain: "snipslot-2629.firebaseapp.com",
      projectId: "snipslot-2629",
      storageBucket: "snipslot-2629.appspot.com",
      messagingSenderId: "330621998514",
      appId: "1:330621998514:web:e2b0de05e46359006480ab",
      measurementId: "G-7DR5SJSG9N"
    };

    // Initialize Firebase using Compat API
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function performReset() {
      const btn = document.getElementById('reset-btn');
      if (!confirm("Are you ABSOLUTELY sure? This will delete all documents in barbers, bookings, reviews, and users collections.")) return;

      btn.disabled = true;
      btn.textContent = "Processing...";

      const collections = [
        'barbers',
        'bookings',
        'customer_reviews',
        'reviews',
        'users',
        'barber_applications',
        'userSessions'
      ];

      for (const collName of collections) {
        log(`Starting wipe for: ${collName}...`, 'info');
        try {
          const querySnapshot = await db.collection(collName).get();

          if (querySnapshot.empty) {
            log(`Collection '${collName}' is already empty.`, 'success');
            continue;
          }

          const batch = db.batch();
          querySnapshot.forEach((doc) => {
            batch.delete(doc.ref);
          });

          await batch.commit();
          log(`Successfully deleted ${querySnapshot.size} documents from '${collName}'.`, 'success');
        } catch (err) {
          log(`Error clearing ${collName}: ${err.message}`, 'error');
          console.error(err);
        }
      }

      log("--- WIPE COMPLETE ---", 'success');
      btn.textContent = "WIPE FINISHED";
      alert("Database cleared! You can now start fresh testing.");
    }

    function log(msg, type) {
      const div = document.createElement('div');
      div.className = 'log-entry ' + type;
      div.textContent = `> ${msg}`;
      document.getElementById('status').appendChild(div);
      document.getElementById('status').scrollTop = document.getElementById('status').scrollHeight;
    }
  </script>

</body>

</html>
