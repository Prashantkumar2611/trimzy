<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Portal — Trimzy</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="js/barber-dashboard-tailwind.js"></script>
  <link rel="stylesheet" href="css/barber-dashboard.css">
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
</head>

<body class="bg-bg text-navy antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR (Desktop Only) -->
    <aside class="hidden md:flex w-64 flex-shrink-0 bg-white border-r border-border flex flex-col h-full z-20">
      <div class="px-6 py-4 border-b border-border">
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow-lg shadow-gold/20 overflow-hidden">
            <img src="favicon.jpg" class="w-full h-full object-cover">
          </div>
          <div>
            <span class="text-navy text-xl font-black tracking-tighter">trimzy</span>
            <p class="text-gray text-[10px] font-bold uppercase tracking-widest">Partner Portal</p>
          </div>
        </div>
      </div>

      <!-- Profile Section -->
      <div class="px-4 py-4 border-b border-border">
        <div class="bg-bg/50 border border-border p-4 rounded-2xl space-y-3 hover:border-gold/30 transition-all group">
          <div class="flex items-center gap-3">
            <div id="side-pwa-avatar"
              class="w-14 h-14 rounded-full bg-gold/10 border-2 border-white shadow-sm flex items-center justify-center text-gold font-black text-xl uppercase overflow-hidden">
              ?
            </div>
            <div class="flex-1 min-w-0">
              <p id="side-pwa-name" class="text-navy text-sm font-black truncate leading-tight">...</p>
              <p id="side-pwa-shop" class="text-gray text-[10px] font-bold truncate mt-0.5">...</p>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center gap-1.5 px-2.5 py-1.5 bg-white rounded-xl border border-border">
              <i data-lucide="star" class="w-3 h-3 text-gold fill-current"></i>
              <span id="side-pwa-rating" class="text-navy text-[10px] font-extrabold uppercase mt-0.5">4.9</span>
              <span id="side-pwa-count" class="text-gray text-[9px] font-bold">(284)</span>
            </div>
            <div id="side-pwa-status-badge"
              class="flex items-center gap-1.5 px-3 py-1.5 bg-gray/5 border border-border rounded-xl transition-all">
              <span id="side-pwa-status-dot" class="w-1.5 h-1.5 rounded-full bg-gray"></span>
              <span id="side-pwa-status-text"
                class="text-[9px] font-black uppercase tracking-widest text-gray">Offline</span>
            </div>
          </div>
        </div>
      </div>


      <!-- Nav -->
      <nav class="flex-1 px-4 py-4 space-y-1.5 overflow-y-auto hide-scrollbar">
        <button onclick="setScreen('dashboard')" id="nav-dashboard"
          class="sidebar-active w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all group">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          <span class="text-sm font-bold">Dashboard</span>
        </button>
        <button onclick="setScreen('appointments')" id="nav-appointments"
          class="text-gray hover:bg-gold/5 hover:text-gold w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all group">
          <i data-lucide="calendar" class="w-4 h-4"></i>
          <span class="text-sm font-bold">Appointments</span>
          <span id="pending-badge"
            class="hidden ml-auto bg-gold text-white text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
        </button>
        <button onclick="setScreen('earnings')" id="nav-earnings"
          class="text-gray hover:bg-gold/5 hover:text-gold w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all group">
          <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
          <span class="text-sm font-bold">Earnings</span>
        </button>
        <button onclick="setScreen('profile')" id="nav-profile"
          class="text-gray hover:bg-gold/5 hover:text-gold w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all group">
          <i data-lucide="user" class="w-4 h-4"></i>
          <span class="text-sm font-bold">My Shop</span>
        </button>
        <button onclick="setScreen('reviews')" id="nav-reviews"
          class="text-gray hover:bg-gold/5 hover:text-gold w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all group">
          <i data-lucide="star" class="w-4 h-4"></i>
          <span class="text-sm font-bold">Reviews</span>
        </button>
        <div class="pt-3 pb-1 px-4">
          <p class="text-[9px] font-bold text-gray uppercase tracking-widest">System</p>
        </div>
        <button onclick="setScreen('settings')" id="nav-settings"
          class="text-gray hover:bg-gold/5 hover:text-gold w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all group">
          <i data-lucide="settings" class="w-4 h-4"></i>
          <span class="text-sm font-bold">Settings</span>
        </button>

        <!-- Status Card -->
        <div class="mt-4 p-4 mx-0 rounded-2xl bg-bg border border-border shadow-sm transition-all duration-300"
          id="status-card-sidebar">
          <div class="flex items-center justify-between">
            <div>
              <p id="status-card-title" class="text-xs font-black uppercase tracking-tight">Accepting Bookings</p>
              <p id="status-card-sub" class="text-[10px] text-gray font-medium mt-0.5">Customers can find you</p>
            </div>
            <label class="switch">
              <input type="checkbox" id="sidebar-status-checkbox" onclick="window.toggleShopStatus(this.checked)">
              <span id="sidebar-slider" class="slider"></span>
            </label>
          </div>
        </div>
      </nav>

      <!-- Bottom Profile -->
      <div class="p-4 border-t border-border">
        <div class="bg-bg rounded-2xl p-3 flex items-center gap-3">
          <div id="barber-avatar-side"
            class="w-10 h-10 rounded-full bg-gold/10 border border-gold/20 flex items-center justify-center text-gold font-bold">
            ?</div>
          <div class="flex-1 min-w-0">
            <p id="barber-name-side" class="text-navy text-xs font-bold truncate">...</p>
            <p class="text-gray text-[10px] truncate">Verified Partner</p>
          </div>
          <button id="logout-btn-side" class="p-2 text-gray hover:text-red-500 transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">

      <!-- MOBILE HEADER (Mobile Only) -->
      <header
        class="md:hidden h-16 flex-shrink-0 bg-white border-b border-border flex items-center justify-between px-4 z-10">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 bg-white rounded-lg flex items-center justify-center overflow-hidden">
            <img src="favicon.jpg" class="w-full h-full object-cover">
          </div>
          <span class="text-navy text-lg font-black tracking-tighter">trimzy</span>
        </div>
        <div class="flex items-center gap-3">
          <button id="status-toggle-mobile"
            class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-bg border border-border transition-all">
            <span id="status-dot-mobile" class="w-2 h-2 rounded-full bg-gray"></span>
            <span id="status-text-mobile"
              class="text-[10px] font-black uppercase tracking-widest text-navy">OFFLINE</span>
          </button>
        </div>
      </header>

      <!-- TOPBAR (Desktop Only) -->
      <header
        class="hidden md:flex h-20 flex-shrink-0 bg-white border-b border-border items-center justify-between px-8 z-10">
        <div>
          <h1 id="screen-title" class="text-navy text-2xl font-black tracking-tighter">Dashboard</h1>
          <p id="topbar-date" class="text-gray text-xs font-medium">...</p>
        </div>
        <div class="flex items-center gap-4">
          <button id="status-toggle-new"
            class="flex items-center gap-2 px-4 py-2 bg-bg border border-border rounded-xl transition-all group">
            <span id="status-dot-new" class="w-2.5 h-2.5 rounded-full bg-gray"></span>
            <span id="status-text-new" class="text-navy text-xs font-bold uppercase tracking-wider">OFFLINE</span>
          </button>

          <button onclick="previewShop()"
            class="flex items-center gap-2 bg-navy text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-navy2 transition-all shadow-lg shadow-navy/10">
            <i data-lucide="plus" class="w-4 h-4 text-gold"></i>
            <span>Preview Shop</span>
          </button>
        </div>
      </header>

      <!-- CONTENT -->
      <main id="main-content"
        class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 md:space-y-8 bg-[#F6F5F2] pb-32 md:pb-8">
        <!-- Dashboard Content will be injected here -->
      </main>

      <!-- BOTTOM NAVIGATION (Mobile Only) -->
      <nav
        class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm h-16 bg-navy/95 backdrop-blur-xl rounded-2xl border border-white/10 shadow-2xl flex items-center justify-around px-2 z-[50]">
        <button onclick="setScreen('dashboard')" id="m-nav-dashboard"
          class="flex flex-col items-center gap-1 group text-gold">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold uppercase tracking-widest">Dash</span>
        </button>
        <button onclick="setScreen('appointments')" id="m-nav-appointments"
          class="flex flex-col items-center gap-1 group text-white/50">
          <i data-lucide="calendar" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold uppercase tracking-widest">Bookings</span>
        </button>
        <button onclick="setScreen('earnings')" id="m-nav-earnings"
          class="flex flex-col items-center gap-1 group text-white/50">
          <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold uppercase tracking-widest">Earn</span>
        </button>
        <button onclick="setScreen('profile')" id="m-nav-profile"
          class="flex flex-col items-center gap-1 group text-white/50">
          <i data-lucide="user" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold uppercase tracking-widest">Shop</span>
        </button>
        <button onclick="setScreen('reviews')" id="m-nav-reviews"
          class="flex flex-col items-center gap-1 group text-white/50">
          <i data-lucide="award" class="w-5 h-5"></i>
          <span class="text-[9px] font-bold uppercase tracking-widest">Reviews</span>
        </button>
      </nav>
    </div>
  </div>

  <div id="toast"
    class="fixed bottom-24 md:bottom-8 right-4 md:right-8 z-[100] flex items-center gap-3 px-6 py-4 bg-white border border-border rounded-2xl shadow-2xl translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
    <div id="toast-icon" class="w-6 h-6 rounded-full flex items-center justify-center"></div>
    <p id="toast-text" class="text-navy text-sm font-bold"></p>
  </div>


  <!-- =====================================================
     FIREBASE — inlined directly, no ./firebase.js import
     ===================================================== -->
  <script type="module" src="js/barber-dashboard.js"></script>
  <!-- Hidden Inputs for photos (Moved here so they remain in DOM always) -->
  <input type="file" id="profile-pic-input" accept="image/*" class="hidden">
  <input type="file" id="salon-photo-input" accept="image/*" class="hidden" multiple>
  <div id="pic-progress"
    style="display:none;position:fixed;top:0;left:0;width:100%;height:4px;z-index:9999;background:rgba(255,255,255,0.2)">
    <div id="pic-progress-fill" style="width:0;height:100%;background:var(--gold);transition:width 0.3s"></div>
  </div>
  <div id="salon-progress"
    style="display:none;position:fixed;top:0;left:0;width:100%;height:4px;z-index:9999;background:rgba(255,255,255,0.2)">
    <div id="salon-progress-fill" style="width:0;height:100%;background:var(--gold);transition:width 0.3s"></div>
  </div>
  <!-- Google Maps for location picker -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBRvFWpX3l6yi8HZ3ylyrBHFcTN2dlbbes&libraries=places"
    async defer></script>
  <script src="js/barber-dashboard-maps.js"></script>

  <!-- PIN VERIFICATION MODAL (V9.0 PREMIER) -->
  <div id="pin-modal" class="hidden fixed inset-0 bg-navy/60 backdrop-blur-md z-[500] items-center justify-center p-6">
    <div
      class="bg-white w-full max-w-[340px] aspect-square rounded-[40px] shadow-2xl p-10 flex flex-col items-center justify-center text-center relative overflow-hidden ring-1 ring-white/20">
      <!-- Decorative Backdrop -->
      <div class="absolute -top-12 -right-12 w-32 h-32 bg-gold/10 rounded-full blur-3xl"></div>

      <div
        class="w-16 h-16 bg-gold/10 rounded-2xl flex items-center justify-center text-gold mb-6 border border-gold/20 shadow-inner">
        <i data-lucide="key-round" class="w-8 h-8"></i>
      </div>

      <h3 class="text-navy text-xl font-black uppercase tracking-tight mb-2">Customer PIN</h3>
      <p class="text-gray text-[10px] font-bold uppercase tracking-widest mb-8 leading-relaxed">Verify identity to start
        session</p>

      <div class="w-full space-y-6">
        <input type="text" id="pin-input"
          class="w-full bg-bg border-2 border-border focus:border-gold rounded-2xl py-4 text-center text-2xl font-black tracking-[1em] text-navy outline-none transition-all placeholder:text-gray/20"
          maxlength="4" placeholder="••••" autocomplete="off" pattern="[0-9]*" inputmode="numeric">

        <div id="pin-error" class="text-red-500 text-[10px] font-black uppercase tracking-widest min-h-[14px]"></div>

        <div class="flex gap-3">
          <button onclick="closePinModal()"
            class="flex-1 py-4 bg-bg text-gray rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-border transition-colors">Cancel</button>
          <button id="btn-verify-pin" onclick="verifyPin()"
            class="flex-[2] py-4 bg-navy text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-navy2 transition-all shadow-lg shadow-navy/20">Start
            Service</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
